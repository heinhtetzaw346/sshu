name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
      is_tag: ${{ startsWith(github.ref, 'refs/tags/') }}
      is_prod_tag: ${{ steps.tag_check.outputs.IS_PROD }}
      is_non_prod_tag: ${{ steps.tag_check.outputs.IS_NON_PROD }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version =' pyproject.toml | head -n 1 | awk -F '"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Check tag
        id: tag_check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            if [[ "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "IS_PROD=true" >> $GITHUB_OUTPUT
              echo "IS_NON_PROD=false" >> $GITHUB_OUTPUT
            elif [[ "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta)[0-9]*$ ]]; then
              echo "IS_PROD=false" >> $GITHUB_OUTPUT
              echo "IS_NON_PROD=true" >> $GITHUB_OUTPUT
            else
              echo "IS_PROD=false" >> $GITHUB_OUTPUT
              echo "IS_NON_PROD=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "IS_PROD=false" >> $GITHUB_OUTPUT
            echo "IS_NON_PROD=false" >> $GITHUB_OUTPUT
          fi

  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirement.txt
      - name: Install with poetry
        run: poetry install
      - name: Run Test
        run: PYTHONPATH=./src poetry run pytest -vv

  build_linux_glibc:
    needs: [prepare, test]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Build docker image to build binary
        run: docker build -t local/sshu-build:latest -f build/Dockerfile.linux_glibc .
      - name: Build binary
        run: docker run --rm -v ./bin:/dist local/sshu-build:latest
      - name: Archive binary
        uses: actions/upload-artifact@v4
        with:
          name: sshu-${{ needs.prepare.outputs.version }}-linux-glibc
          path: bin/sshu

  build_linux_musl:
    needs: [prepare, test]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Build docker image to build binary
        run: docker build -t local/sshu-build:latest -f build/Dockerfile.linux_musl .
      - name: Build binary
        run: docker run --rm -v ./bin:/dist local/sshu-build:latest
      - name: Archive binary
        uses: actions/upload-artifact@v4
        with:
          name: sshu-${{ needs.prepare.outputs.version }}-linux-musl
          path: bin/sshu

  build_windows:
    needs: [prepare, test]
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          py -m pip install --upgrade pip
          pip install -r requirement.txt
      - name: Install with poetry
        run: poetry install
      - name: Build binary
        run: |
            $Env:PYTHONPATH = ".\src"
            poetry run pyinstaller --name sshu --distpath .\bin -p .\src\sshu --onefile .\src\sshu\cli.py
      - name: Archive binary
        uses: actions/upload-artifact@v4
        with:
          name: sshu-${{ needs.prepare.outputs.version }}-windows
          path: bin/sshu.exe

  build_macos:
    needs: [prepare, test]
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirement.txt
      - name: Install with poetry
        run: poetry install
      - name: Build binary
        run: PYTHONPATH=./src poetry run pyinstaller --name sshu --distpath ./bin -p ./src/sshu --onefile ./src/sshu/cli.py
      - name: Archive binary
        uses: actions/upload-artifact@v4
        with:
          name: sshu-${{ needs.prepare.outputs.version }}-macos
          path: bin/sshu

  build_pip:
    needs: [prepare, build_linux_glibc, build_linux_musl, build_windows, build_macos]
    if: needs.prepare.outputs.is_prod_tag == 'true' || needs.prepare.outputs.is_non_prod_tag == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirement.txt
      - name: Install with poetry
        run: poetry install
      - name: Build pip
        run: poetry build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pip-${{ needs.prepare.outputs.version }}
          path: dist

  upload_pip_non_prod:
    needs: [prepare, build_pip]
    if: needs.prepare.outputs.is_non_prod_tag == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: pip-${{ needs.prepare.outputs.version }}
          path: dist
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install twine
        run: |
          python3 -m pip install --upgrade pip
          pip install twine
      - name: Set token
        run: echo -e "[testpypi]\nusername = __token__\npassword = ${{ secrets.TEST_PYPI_TOKEN }}" > $HOME/.pypirc
      - name: Upload to test-pypi
        run: twine upload --repository testpypi dist/* || true

  release_prod:
    needs: [prepare, build_pip]
    if: needs.prepare.outputs.is_prod_tag == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install twine
        run: |
          python3 -m pip install --upgrade pip
          pip install twine
      - name: Set token
        run: echo -e "[pypi]\nusername = __token__\npassword = ${{ secrets.PYPI_TOKEN }}" > $HOME/.pypirc
      - name: Upload to PyPI
        run: twine upload --repository pypi all-artifacts/pip-${{ needs.prepare.outputs.version }}/* || true
      - name: Rename binaries for release
        run: |
          mkdir -p release-binaries
          cp all-artifacts/sshu-${{ needs.prepare.outputs.version }}-linux-glibc/sshu release-binaries/sshu-linux-glibc
          cp all-artifacts/sshu-${{ needs.prepare.outputs.version }}-linux-musl/sshu release-binaries/sshu-linux-musl
          cp all-artifacts/sshu-${{ needs.prepare.outputs.version }}-windows/sshu.exe release-binaries/sshu-windows.exe
          cp all-artifacts/sshu-${{ needs.prepare.outputs.version }}-macos/sshu release-binaries/sshu-macos
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-binaries/*
          body: |
            Release ${{ needs.prepare.outputs.version }}
            
            PyPI Registry: https://pypi.org/project/sshu/${{ needs.prepare.outputs.version }}/
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
